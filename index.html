<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>X-ray Yearly - Stable</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .btn { border: none; padding: 12px; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--primary); }
        .btn-s { background: #10b981; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: #334155; color: white; padding: 10px; border: 1px solid #1e293b; }
        td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; }
        .dr-col { text-align: left; font-weight: bold; color: var(--primary); }

        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#1e293b; z-index:5000; display:flex; align-items:center; justify-content:center; }
        #print-area { display: none; }

        @media print {
            body * { display: none !important; }
            #print-area { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
            table { width: 100%; border: 1px solid black; }
            th, td { border: 1px solid black !important; padding: 8px; color: black !important; }
            h2 { text-align: center; }
        }
    </style>
</head>
<body>

<div id="print-area"></div>

<div id="login-screen">
    <div class="card" style="width:300px; text-align:center;">
        <h3>X-RAY LOGIN</h3>
        <input type="password" id="passIn" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px; text-align:center;">
        <button class="btn btn-p" onclick="doLogin()">SIGN IN</button>
    </div>
</div>

<div id="app-body" style="display:none;">
    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
        <b>X-ray Dashboard</b>
        <span class="material-icons" style="color:red; cursor:pointer;" onclick="location.reload()">logout</span>
    </div>

    <div class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
            <input type="number" id="dayIn" placeholder="Day">
            <select id="monthIn">
                <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="Mar">Mar</option>
                <option value="Apr">Apr</option><option value="May">May</option><option value="Jun">Jun</option>
                <option value="Jul">Jul</option><option value="Aug">Aug</option><option value="Sep">Sep</option>
                <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
            </select>
        </div>
        <button class="btn btn-p" onclick="openEntry()">စာရင်းသွင်းရန် နှိပ်ပါ</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0;">နှစ်ချုပ်ဇယား (Yearly)</h3>
            <button class="btn btn-s" style="width:120px;" onclick="printYearly()">
                <span class="material-icons">print</span> PRINT
            </button>
        </div>
        <div id="yearly-table-div">
            <table>
                <thead>
                    <tr><th>Doctor Name</th><th>W Total</th><th>R Total</th><th>Grand Total</th></tr>
                </thead>
                <tbody id="yearly-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="entryModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#1e293b; z-index:1000; padding:15px; overflow-y:auto;">
    <div style="display:flex; justify-content:space-between; color:white; margin-bottom:20px;">
        <h3>စာရင်းသွင်းခြင်း</h3>
        <button class="btn btn-s" style="width:80px;" onclick="closeEntry()">DONE</button>
    </div>
    <div id="entryRows"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAo0NxlLIUtWzIJJx8Ein5Ftidacw0W9Lw",
        authDomain: "myrecordsystem-af249.firebaseapp.com",
        projectId: "myrecordsystem-af249",
        storageBucket: "myrecordsystem-af249.firebasestorage.app",
        messagingSenderId: "64211980634",
        appId: "1:64211980634:web:1a7632c615217b2545e363"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let doctors = ["Doctor W", "Doctor R", "Staff A", "Staff B"]; // ဆရာဝန်စာရင်း နမူနာ
    let database = {};
    let rates = { w: 2500, r: 2000 };

    window.doLogin = () => {
        if(document.getElementById('passIn').value === "1234") {
            document.getElementById('login-screen').style.display='none';
            document.getElementById('app-body').style.display='block';
            startSync();
        } else { alert("Wrong Password!"); }
    };

    function startSync() {
        onSnapshot(doc(db, "xray_system", "main_data"), (snapshot) => {
            if (snapshot.exists()) {
                database = snapshot.data().db || {};
                doctors = snapshot.data().drs || doctors;
                updateYearlyUI();
            }
        });
    }

    async function saveData() {
        await setDoc(doc(db, "xray_system", "main_data"), { db: database, drs: doctors });
    }

    window.openEntry = () => {
        const d = document.getElementById('dayIn').value;
        const m = document.getElementById('monthIn').value;
        if(!d) return alert("နေ့ရက် ထည့်ပါ");
        
        document.getElementById('entryModal').style.display='block';
        const dateKey = `${m}_2026`;
        document.getElementById('entryRows').innerHTML = doctors.map((dr, i) => {
            const val = (database[dateKey]?.[d]?.[i]) || {w:'', r:''};
            return `<div class="card" style="margin-bottom:10px;">
                <p><b>${dr}</b></p>
                W: <input type="number" id="w-${i}" value="${val.w}" oninput="updateVal(${i})" style="width:60px;">
                R: <input type="number" id="r-${i}" value="${val.r}" oninput="updateVal(${i})" style="width:60px;">
            </div>`;
        }).join('');
    };

    window.updateVal = (i) => {
        const d = document.getElementById('dayIn').value;
        const m = document.getElementById('monthIn').value;
        const dateKey = `${m}_2026`;
        if(!database[dateKey]) database[dateKey] = {};
        if(!database[dateKey][d]) database[dateKey][d] = {};
        database[dateKey][d][i] = {
            w: document.getElementById(`w-${i}`).value,
            r: document.getElementById(`r-${i}`).value
        };
    };

    window.closeEntry = async () => {
        document.getElementById('entryModal').style.display='none';
        await saveData();
    };

    function updateYearlyUI() {
        let html = "";
        doctors.forEach((dr, i) => {
            let tw = 0, tr = 0;
            Object.values(database).forEach(monthData => {
                Object.values(monthData).forEach(dayData => {
                    if(dayData[i]) {
                        tw += (Number(dayData[i].w) || 0);
                        tr += (Number(dayData[i].r) || 0);
                    }
                });
            });
            const total = (tw * rates.w) + (tr * rates.r);
            if(tw > 0 || tr > 0) {
                html += `<tr><td class="dr-col">${dr}</td><td>${tw}</td><td>${tr}</td><td>${total.toLocaleString()}</td></tr>`;
            }
        });
        document.getElementById('yearly-body').innerHTML = html;
    }

    window.printYearly = () => {
        const content = document.getElementById('yearly-table-div').innerHTML;
        const year = new Date().getFullYear();
        document.getElementById('print-area').innerHTML = `<h2>Yearly Summary Report (${year})</h2>` + content;
        window.print();
    };

    window.onload = () => {
        document.getElementById('monthIn').value = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][new Date().getMonth()];
        document.getElementById('dayIn').value = new Date().getDate();
    };
</script>

</body>
</html>
